<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- 배경 그라디언트 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1fae5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- 장식용 원 -->
  <circle cx="1100" cy="80" r="180" fill="#bbf7d0" opacity="0.5" />
  <circle cx="100" cy="550" r="150" fill="#bbf7d0" opacity="0.4" />
  <circle cx="950" cy="520" r="80" fill="#86efac" opacity="0.3" />

  <!-- 로고 배경 원형 카드 -->
  <rect x="100" y="155" width="200" height="200" rx="40" fill="url(#card)" />

  <!-- 로고 N 텍스트 -->
  <text x="200" y="290" font-size="120" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold">N</text>

  <!-- 앱 이름 -->
  <text x="340" y="240" font-size="80" fill="#15803d" font-family="Arial, sans-serif" font-weight="bold">NutriScan</text>

  <!-- 태그라인 -->
  <text x="340" y="310" font-size="36" fill="#166534" font-family="Arial, sans-serif" font-weight="500">AI 기반 스마트 식단관리</text>

  <!-- 구분선 -->
  <rect x="100" y="400" width="1000" height="2" fill="#86efac" opacity="0.8" />

  <!-- 기능 목록 -->
  <text x="130" y="470" font-size="30" fill="#15803d" font-family="Arial, sans-serif">📷 냉장고 사진으로 재료 인식</text>
  <text x="130" y="520" font-size="30" fill="#15803d" font-family="Arial, sans-serif">🍳 AI 레시피 추천 · 🛡️ 알레르기 필터링 · 🔥 칼로리 관리</text>

  <!-- 우측 URL 표시 -->
  <text x="1100" y="610" font-size="22" fill="#4ade80" font-family="Arial, sans-serif" text-anchor="end" opacity="0.8">nutri-scan-firebase-google-login.vercel.app</text>
</svg>
